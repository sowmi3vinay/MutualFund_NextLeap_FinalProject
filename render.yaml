services:
  - type: web
    name: mutual-fund-advisor-api
    env: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: EMBEDDING_LOCAL_FILES_ONLY
        value: false
      - key: VECTOR_BACKEND
        value: supabase
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
