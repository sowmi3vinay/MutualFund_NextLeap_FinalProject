services:
  - type: web
    name: mutual-fund-advisor-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: EMBEDDING_LOCAL_FILES_ONLY
        value: false
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
